<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mittelalter – Lobby</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0b1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;
}

.panel{
    background:#121a2b;
    padding:30px;
    border-radius:12px;
    width:420px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
    margin-top:0;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:6px;
    border:none;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    background:#2e7df6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3f8cff;
}

#playerList{
    margin-top:20px;
    background:#0b1220;
    padding:10px;
    border-radius:6px;
    min-height:60px;
}

.player{
    padding:6px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

#roomInfo{
    margin-top:10px;
    font-size:14px;
    opacity:0.9;
    min-height:18px;
}

.startBtn{
    background:#22c55e;
}

.startBtn:hover{
    background:#34d977;
}

.backBtn{
    background:#555;
}

.backBtn:hover{
    background:#777;
}

.meta{
    margin-top:12px;
    font-size:12px;
    opacity:0.75;
    line-height:1.45;
}

.quickNameGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px;
    margin-bottom:14px;
}

.quickNameBtn{
    margin-top:0;
    padding:10px;
    font-size:15px;
    background:#1d4ed8;
}

.quickNameBtn:hover{
    background:#2563eb;
}

.colorGrid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    margin-top:8px;
    margin-bottom:16px;
}

.colorBtn{
    width:100%;
    aspect-ratio:1 / 1;
    margin-top:0;
    padding:0;
    border-radius:50%;
    border:3px solid transparent;
    background:transparent;
    position:relative;
    overflow:hidden;
}

.colorBtn::after{
    content:'';
    position:absolute;
    inset:8px;
    border-radius:50%;
    box-shadow:0 0 0 2px rgba(255,255,255,0.15) inset;
}

.colorBtn[data-slot="0"]::after{
    background:#ef4444;
}
.colorBtn[data-slot="1"]::after{
    background:#3b82f6;
}
.colorBtn[data-slot="2"]::after{
    background:#22c55e;
}
.colorBtn[data-slot="3"]::after{
    background:#facc15;
}

.colorBtn.selected{
    border-color:#ffffff;
    box-shadow:0 0 0 3px rgba(255,255,255,0.18);
}

#selectedColorLabel{
    margin-top:-4px;
    margin-bottom:14px;
    font-size:14px;
    opacity:0.9;
    min-height:18px;
}
</style>
</head>

<body>

<div class="panel">

<h1>Mittelalter Lobby</h1>

<label>Spielername</label>
<input id="nameInput" placeholder="Name eingeben">

<div class="quickNameGrid">
    <button type="button" class="quickNameBtn" onclick="selectQuickName('Christoph')">Christoph</button>
    <button type="button" class="quickNameBtn" onclick="selectQuickName('Vanessa')">Vanessa</button>
    <button type="button" class="quickNameBtn" onclick="selectQuickName('David')">David</button>
    <button type="button" class="quickNameBtn" onclick="selectQuickName('Gast')">Gast</button>
</div>

<label>Farbe wählen</label>
<div class="colorGrid">
    <button type="button" class="colorBtn" data-slot="0" aria-label="Rot" title="Rot" onclick="selectColor(0)"></button>
    <button type="button" class="colorBtn" data-slot="1" aria-label="Blau" title="Blau" onclick="selectColor(1)"></button>
    <button type="button" class="colorBtn" data-slot="2" aria-label="Grün" title="Grün" onclick="selectColor(2)"></button>
    <button type="button" class="colorBtn" data-slot="3" aria-label="Gelb" title="Gelb" onclick="selectColor(3)"></button>
</div>
<div id="selectedColorLabel">Noch keine Farbe gewählt</div>

<button onclick="createRoom()">Raum erstellen</button>

<label>Raumcode</label>
<input id="roomInput" placeholder="z.B. EX6R">

<button onclick="joinRoom()">Raum beitreten</button>

<div id="roomInfo">Verbinde mit Server …</div>
<div class="meta" id="serverStatus">Server: –</div>

<h3>Spieler</h3>
<div id="playerList"></div>

<button class="startBtn" onclick="startGame()">Spiel starten</button>

<button class="backBtn" onclick="goBack()">Zur Spielauswahl</button>

<div class="meta">Online-Modus aktiv. Kein Offline-Mock mehr in der Lobby.</div>

</div>

<script src="mittelalter.online.js?v=6"></script>
</body>
</html>
